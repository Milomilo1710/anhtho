<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hero Section</title>

    <!-- Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
        }

        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10%;
            overflow: hidden;
        }

        /* Blob shape */
        .blob {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: #87CEFA; /* Sky Blue */
            border-radius: 50% 40% 60% 70%;
            filter: blur(40px);
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 700;
            color: #222;
            line-height: 1.4;
        }

        .highlight {
            color: #ff4da6; /* Pink */
        }

        .hero p {
            margin: 20px 0;
            font-size: 16px;
            color: #555;
        }

        .cta-btn {
            display: inline-block;
            padding: 12px 28px;
            background: #87CEFA;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: 0.3s;
        }

        .cta-btn:hover {
            background: #ff4da6;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="blob"></div>

        <div class="hero-content">
            <h1>
                Thiết kế <span class="highlight">UI/UX hiện đại</span><br>
                cho trải nghiệm <span class="highlight">đỉnh cao</span>
            </h1>

            <p>
                Tạo ra những sản phẩm số đẹp mắt, dễ sử dụng và mang lại cảm xúc tốt nhất cho người dùng.
            </p>

            <a href="#" class="cta-btn">Bắt đầu ngay</a>
        </div>
    </section>

</body>
</html>
