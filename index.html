<!DOCTYPE html>
<html>
<head>
    <title>Milo Portfolio</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(to right, #ffd6ec, #d6f0ff);
        }

        section {
            padding: 50px;
            text-align: center;
        }

        .hero {
            background: linear-gradient(to right, #ff9ecf, #8fd3ff);
            color: white;
            padding: 80px 20px;
        }

        h1 {
            font-size: 40px;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            border-radius: 20px;
            width: 80%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.05);
        }

        h2 {
            color: #ff6fa5;
        }
    </style>
</head>

<body>

    <section class="hero">
        <h1>Milo 🎀</h1>
        <p>Future UI/UX Designer 💖</p>
    </section>

    <section>
        <h2>About</h2>
        <div class="box">
            <p>Tui là sinh viên thiết kế, thích màu pastel và đang học UI/UX + 3D ✨</p>
        </div>
    </section>

    <section>
        <h2>Projects</h2>
        <div class="box">
            <p>🌸 Thiết kế UI app đơn giản</p>
            <p>🌸 Model 3D nhân vật</p>
        </div>
    </section>

    <section>
        <h2>Skills</h2>
        <div class="box">
            <p>💙 HTML, CSS</p>
            <p>💙 Photoshop</p>
            <p>💙 Blender</p>
        </div>
    </section>

    <section>
        <h2>Contact</h2>
        <div class="box">
            <p>Email: example@gmail.com</p>
        </div>
    </section>

</body>
</html>
